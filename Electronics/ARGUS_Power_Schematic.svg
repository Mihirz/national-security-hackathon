<svg viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace" font-size="10">
  <rect width="1100" height="850" fill="#0f172a" rx="8"/>
  <text x="550" y="30" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">PROJECT ARGUS — Power &amp; Interface Schematic</text>
  <text x="550" y="46" text-anchor="middle" fill="#94a3b8" font-size="10">KiCad-Style Reference · Rev A · May 2026</text>

  <!-- ========== POWER REGULATION (top) ========== -->
  <rect x="20" y="60" width="1060" height="250" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="35" y="80" fill="#f59e0b" font-size="13" font-weight="bold">POWER REGULATION</text>

  <!-- Solar Input -->
  <rect x="40" y="100" width="120" height="60" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="100" y="122" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">J1: Solar In</text>
  <text x="100" y="138" text-anchor="middle" fill="#fcd34d" font-size="9">XT60 · 18-24V</text>
  <text x="100" y="152" text-anchor="middle" fill="#fcd34d" font-size="9">180W peak</text>

  <!-- MPPT -->
  <rect x="210" y="95" width="150" height="70" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="285" y="115" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">U1: MPPT</text>
  <text x="285" y="130" text-anchor="middle" fill="#fcd34d" font-size="9">SPV1050 · 98% eff</text>
  <text x="220" y="148" fill="#94a3b8" font-size="8">VIN+ ─── VBAT+</text>
  <text x="220" y="158" fill="#94a3b8" font-size="8">GND ──── GND</text>

  <!-- Battery -->
  <rect x="410" y="95" width="140" height="70" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="480" y="115" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">BT1: LiPo 4S</text>
  <text x="480" y="130" text-anchor="middle" fill="#fcd34d" font-size="9">14.8V · 10Ah · 148Wh</text>
  <text x="420" y="148" fill="#94a3b8" font-size="8">BAL: JST-XH 5-pin</text>
  <text x="420" y="158" fill="#94a3b8" font-size="8">OUT: XT60</text>

  <!-- Buck 5V -->
  <rect x="600" y="90" width="155" height="80" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="677" y="110" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">U2: Buck 5V</text>
  <text x="677" y="125" text-anchor="middle" fill="#fcd34d" font-size="9">TPS54560 · 5V @ 5A</text>
  <text x="610" y="143" fill="#94a3b8" font-size="8">VIN: 14.8V  VOUT: 5.0V</text>
  <text x="610" y="155" fill="#94a3b8" font-size="8">L1: 10µH · C1: 22µF ×2</text>
  <text x="610" y="167" fill="#94a3b8" font-size="8">FB: 100k/24.9k divider</text>

  <!-- LDO 3.3V -->
  <rect x="800" y="90" width="130" height="80" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="865" y="110" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">U3: LDO 3.3V</text>
  <text x="865" y="125" text-anchor="middle" fill="#fcd34d" font-size="9">TLV1117 · 0.8A</text>
  <text x="810" y="143" fill="#94a3b8" font-size="8">VIN: 5.0V → 3.3V</text>
  <text x="810" y="155" fill="#94a3b8" font-size="8">C2: 10µF ceramic</text>
  <text x="810" y="167" fill="#94a3b8" font-size="8">C3: 10µF tantalum</text>

  <!-- LDO 1.8V -->
  <rect x="960" y="90" width="110" height="80" rx="3" fill="#422006" stroke="#f59e0b"/>
  <text x="1015" y="110" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">U4: LDO 1.8V</text>
  <text x="1015" y="125" text-anchor="middle" fill="#fcd34d" font-size="9">AP2112 · 0.6A</text>
  <text x="970" y="143" fill="#94a3b8" font-size="8">VIN: 3.3V → 1.8V</text>
  <text x="970" y="155" fill="#94a3b8" font-size="8">C4: 1µF MLCC</text>

  <!-- Power flow arrows -->
  <line x1="160" y1="130" x2="210" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="130" x2="410" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="130" x2="600" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="755" y1="130" x2="800" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="930" y1="130" x2="960" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Power rail labels -->
  <rect x="40" y="195" width="80" height="22" rx="2" fill="#7c2d12" stroke="#f59e0b"/>
  <text x="80" y="210" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">14.8V BUS</text>
  <line x1="120" y1="206" x2="580" y2="206" stroke="#ef4444" stroke-width="2"/>

  <rect x="600" y="195" width="70" height="22" rx="2" fill="#7c2d12" stroke="#f59e0b"/>
  <text x="635" y="210" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">5V RAIL</text>
  <line x1="670" y1="206" x2="790" y2="206" stroke="#f97316" stroke-width="2"/>

  <rect x="800" y="195" width="80" height="22" rx="2" fill="#7c2d12" stroke="#f59e0b"/>
  <text x="840" y="210" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">3.3V RAIL</text>
  <line x1="880" y1="206" x2="950" y2="206" stroke="#eab308" stroke-width="2"/>

  <rect x="960" y="195" width="80" height="22" rx="2" fill="#7c2d12" stroke="#f59e0b"/>
  <text x="1000" y="210" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">1.8V RAIL</text>

  <!-- ESC direct from battery -->
  <rect x="40" y="240" width="180" height="50" rx="3" fill="#1a1a2e" stroke="#ef4444"/>
  <text x="130" y="258" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">ESC ×2 (Battery Direct)</text>
  <text x="130" y="273" text-anchor="middle" fill="#fecaca" font-size="9">14.8V → BLDC ×2 · 200W ea</text>
  <text x="130" y="285" text-anchor="middle" fill="#94a3b8" font-size="8">D1/D2: Schottky flyback diodes</text>
  <line x1="130" y1="217" x2="130" y2="240" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Jetson 5V in -->
  <rect x="300" y="240" width="180" height="50" rx="3" fill="#2e1065" stroke="#8b5cf6"/>
  <text x="390" y="258" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Jetson Orin Nano</text>
  <text x="390" y="273" text-anchor="middle" fill="#a78bfa" font-size="9">5V @ 3A via barrel jack</text>
  <text x="390" y="285" text-anchor="middle" fill="#94a3b8" font-size="8">C5: 100µF bulk + 0.1µF bypass</text>
  <line x1="635" y1="217" x2="635" y2="228" stroke="#f97316" stroke-width="1.5"/>
  <line x1="635" y1="228" x2="390" y2="228" stroke="#f97316" stroke-width="1.5"/>
  <line x1="390" y1="228" x2="390" y2="240" stroke="#f97316" stroke-width="1.5"/>

  <!-- ========== SENSOR INTERFACES (middle) ========== -->
  <rect x="20" y="320" width="530" height="260" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="35" y="340" fill="#22d3ee" font-size="13" font-weight="bold">SENSOR INTERFACES</text>

  <!-- I2S MEMS -->
  <rect x="35" y="355" width="245" height="65" rx="3" fill="#042f2e" stroke="#14b8a6"/>
  <text x="157" y="372" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="bold">I²S TDM: MEMS Infrasound ×8</text>
  <text x="45" y="390" fill="#94a3b8" font-size="8">U5-U12: ICS-40730 · 1.8V · TDM addr 0-7</text>
  <text x="45" y="402" fill="#94a3b8" font-size="8">R1-R8: 100Ω series on DOUT lines</text>
  <text x="45" y="414" fill="#94a3b8" font-size="8">C6-C13: 0.1µF bypass per mic</text>

  <!-- SPI SWIR -->
  <rect x="35" y="430" width="245" height="60" rx="3" fill="#1e1b4b" stroke="#6366f1"/>
  <text x="157" y="447" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="bold">SPI0: SWIR Lepton 3.5 ×2</text>
  <text x="45" y="465" fill="#94a3b8" font-size="8">U13-U14: VoSPI mode · CS0/CS1 select</text>
  <text x="45" y="477" fill="#94a3b8" font-size="8">Q1: Si2301 gate (GPIO Pin 31) · 3.3V switched</text>
  <text x="45" y="487" fill="#94a3b8" font-size="8">C14-C15: 4.7µF + 0.1µF per sensor</text>

  <!-- CSI EO -->
  <rect x="35" y="500" width="245" height="55" rx="3" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="157" y="517" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">CSI-2: EO Camera IMX477</text>
  <text x="45" y="535" fill="#94a3b8" font-size="8">U15: 2-lane MIPI · 1.8V VDDIO + 2.8V analog</text>
  <text x="45" y="547" fill="#94a3b8" font-size="8">Q2: Si2301 gate (GPIO Pin 29) · power gated</text>

  <!-- SPI1 column -->
  <rect x="295" y="355" width="245" height="65" rx="3" fill="#052e16" stroke="#22c55e"/>
  <text x="417" y="372" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">SPI1: LoRa + IMU</text>
  <text x="305" y="390" fill="#94a3b8" font-size="8">U16: RFM95W · CS Pin 18 · 3.3V</text>
  <text x="305" y="402" fill="#94a3b8" font-size="8">U17: ICM-42688 · CS Pin 16 · 1.8V</text>
  <text x="305" y="414" fill="#94a3b8" font-size="8">R9: 10k pullup on each CS line</text>

  <!-- I2C -->
  <rect x="295" y="430" width="245" height="60" rx="3" fill="#1a1a2e" stroke="#f59e0b"/>
  <text x="417" y="447" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">I²C0: Baro + I²C1: Power Mon</text>
  <text x="305" y="465" fill="#94a3b8" font-size="8">U18: BMP390 · 0x77 · 3.3V · I²C0</text>
  <text x="305" y="477" fill="#94a3b8" font-size="8">U19: INA219 · 0x40 · 3.3V · I²C1</text>
  <text x="305" y="487" fill="#94a3b8" font-size="8">R10-R13: 4.7k pullups on SDA/SCL</text>

  <!-- UART -->
  <rect x="295" y="500" width="245" height="55" rx="3" fill="#052e16" stroke="#22c55e"/>
  <text x="417" y="517" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">UART: GPS + Iridium</text>
  <text x="305" y="535" fill="#94a3b8" font-size="8">U20: NEO-M9N · UART0 · 115200 · 3.3V</text>
  <text x="305" y="547" fill="#94a3b8" font-size="8">U21: 9603N · UART1 · 19200 · 5V logic</text>

  <!-- ========== CONNECTORS & PROTECTION (right) ========== -->
  <rect x="570" y="320" width="500" height="260" rx="6" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="585" y="340" fill="#e2e8f0" font-size="13" font-weight="bold">CONNECTORS &amp; PROTECTION</text>

  <!-- External mic harness -->
  <rect x="585" y="355" width="230" height="60" rx="3" fill="#042f2e" stroke="#14b8a6"/>
  <text x="700" y="372" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="bold">J2-J5: External Mic Harness</text>
  <text x="595" y="390" fill="#94a3b8" font-size="8">4× JST-GH 4-pin to wingtip/boom mics</text>
  <text x="595" y="402" fill="#94a3b8" font-size="8">Twisted pair (signal+GND) · EMI shielded</text>
  <text x="595" y="412" fill="#94a3b8" font-size="8">R14-R17: 100Ω termination resistors</text>

  <!-- Antenna connectors -->
  <rect x="585" y="425" width="230" height="55" rx="3" fill="#052e16" stroke="#22c55e"/>
  <text x="700" y="442" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">J6-J8: Antenna Ports</text>
  <text x="595" y="460" fill="#94a3b8" font-size="8">J6: SMA → GPS active patch</text>
  <text x="595" y="472" fill="#94a3b8" font-size="8">J7: SMA → LoRa whip 915MHz</text>
  <text x="595" y="484" fill="#64748b" font-size="8">J8: SMA → Iridium L-band patch</text>

  <!-- USB / Debug -->
  <rect x="585" y="490" width="230" height="55" rx="3" fill="#1e3a5f" stroke="#ec4899"/>
  <text x="700" y="507" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="bold">J9-J10: USB &amp; Debug</text>
  <text x="595" y="525" fill="#94a3b8" font-size="8">J9: USB-A → Theta Z1 (gated 5V)</text>
  <text x="595" y="537" fill="#94a3b8" font-size="8">J10: USB-C → Jetson debug/flash</text>

  <!-- ESD / TVS -->
  <rect x="830" y="355" width="230" height="60" rx="3" fill="#1a1a2e" stroke="#64748b"/>
  <text x="945" y="372" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="bold">ESD / TVS Protection</text>
  <text x="840" y="390" fill="#94a3b8" font-size="8">D3-D6: PRTR5V0U2X on USB/UART</text>
  <text x="840" y="402" fill="#94a3b8" font-size="8">D7-D8: SM712 on I²C lines</text>
  <text x="840" y="412" fill="#94a3b8" font-size="8">F1: 500mA PTC on 5V rail</text>

  <!-- Watchdog -->
  <rect x="830" y="425" width="230" height="55" rx="3" fill="#1a1a2e" stroke="#a78bfa"/>
  <text x="945" y="442" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Watchdog / Reset</text>
  <text x="840" y="460" fill="#94a3b8" font-size="8">U22: TPS3823 · 1.6s timeout</text>
  <text x="840" y="472" fill="#94a3b8" font-size="8">WDI → GPIO Pin 7 (heartbeat)</text>
  <text x="840" y="484" fill="#64748b" font-size="8">RESET → Jetson SYS_RST#</text>

  <!-- Status LEDs -->
  <rect x="830" y="490" width="230" height="55" rx="3" fill="#1a1a2e" stroke="#22c55e"/>
  <text x="945" y="507" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">Status LEDs</text>
  <text x="840" y="525" fill="#94a3b8" font-size="8">D9: Green — Power OK (3.3V rail)</text>
  <text x="840" y="537" fill="#94a3b8" font-size="8">D10: Amber — Heartbeat (GPIO)</text>
  <text x="840" y="549" fill="#64748b" font-size="8">D11: Red — Alert (Tier 2+ active)</text>

  <!-- ========== DESIGN NOTES (bottom) ========== -->
  <rect x="20" y="600" width="1060" height="240" rx="6" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="35" y="620" fill="#e2e8f0" font-size="13" font-weight="bold">DESIGN NOTES</text>

  <text x="40" y="648" fill="#94a3b8" font-size="10" font-weight="bold">PCB Specifications</text>
  <text x="40" y="665" fill="#64748b" font-size="9">• 4-layer stack: Signal / GND / Power / Signal</text>
  <text x="40" y="680" fill="#64748b" font-size="9">• 100mm × 65mm form factor (fits 14cm ⌀ fuselage pod)</text>
  <text x="40" y="695" fill="#64748b" font-size="9">• 1oz copper, ENIG finish, impedance-controlled (50Ω microstrip)</text>
  <text x="40" y="710" fill="#64748b" font-size="9">• Operating temp: -55°C to +40°C (stratospheric)</text>
  <text x="40" y="725" fill="#64748b" font-size="9">• Conformal coating: Parylene C (moisture + altitude protection)</text>

  <text x="400" y="648" fill="#94a3b8" font-size="10" font-weight="bold">Thermal Management</text>
  <text x="400" y="665" fill="#64748b" font-size="9">• Jetson heatsink: Copper cold plate → CF fuselage skin (conduction)</text>
  <text x="400" y="680" fill="#64748b" font-size="9">• TEC (Peltier) backup for peak compute loads (15W TDP)</text>
  <text x="400" y="695" fill="#64748b" font-size="9">• Stratospheric ambient: -55°C — passive cooling sufficient at cruise</text>
  <text x="400" y="710" fill="#64748b" font-size="9">• Sensor windows: Germanium (SWIR), BK7 glass (EO) — thermal isolators</text>

  <text x="760" y="648" fill="#94a3b8" font-size="10" font-weight="bold">EMC / Signal Integrity</text>
  <text x="760" y="665" fill="#64748b" font-size="9">• SPI clock: 10MHz max (short traces, no stubs)</text>
  <text x="760" y="680" fill="#64748b" font-size="9">• I²S BCLK: 3.072MHz (48kHz × 64 TDM slots)</text>
  <text x="760" y="695" fill="#64748b" font-size="9">• CSI-2: Differential 100Ω, length-matched ±0.5mm</text>
  <text x="760" y="710" fill="#64748b" font-size="9">• Ground pour on both signal layers</text>
  <text x="760" y="725" fill="#64748b" font-size="9">• Star ground topology: analog/digital/power separated</text>

  <!-- BOM reference -->
  <rect x="40" y="745" width="1030" height="80" rx="3" fill="#1e293b" stroke="#475569"/>
  <text x="550" y="765" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">BILL OF MATERIALS SUMMARY</text>
  <text x="110" y="788" text-anchor="middle" fill="#fcd34d" font-size="10">22 ICs</text>
  <text x="250" y="788" text-anchor="middle" fill="#fcd34d" font-size="10">36 line items</text>
  <text x="410" y="788" text-anchor="middle" fill="#fcd34d" font-size="10">7 categories</text>
  <text x="580" y="788" text-anchor="middle" fill="#22c55e" font-size="10">Unit cost: ~$7,458</text>
  <text x="750" y="788" text-anchor="middle" fill="#94a3b8" font-size="10">See: ARGUS_BOM.xlsx</text>
  <text x="940" y="788" text-anchor="middle" fill="#94a3b8" font-size="10">Weight budget: 1.2 kg (electronics)</text>
  <text x="550" y="810" text-anchor="middle" fill="#64748b" font-size="9">Ref designators: U=IC, R=Resistor, C=Capacitor, D=Diode/LED, Q=MOSFET, J=Connector, F=Fuse, L=Inductor, BT=Battery</text>
</svg>
